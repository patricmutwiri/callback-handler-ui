<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" fill="#F8FAFC"/>
  <rect x="50" y="40" width="1300" height="780" rx="28" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <text x="90" y="110" fill="#0F172A" font-family="Arial, sans-serif" font-size="46" font-weight="700">Feature Requests</text>
  <text x="92" y="154" fill="#475569" font-family="Arial, sans-serif" font-size="24">Share what would make Callback Handler more useful for your workflow.</text>
  <rect x="90" y="220" width="1180" height="520" rx="24" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="125" y="278" fill="#0F172A" font-family="Arial, sans-serif" font-size="38" font-weight="700">Tell us what to build next</text>
  <text x="125" y="322" fill="#475569" font-family="Arial, sans-serif" font-size="22">Requests are saved in an admin queue and mirrored into GitHub.</text>
  <rect x="125" y="380" width="450" height="190" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="155" y="430" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">What happens next</text>
  <text x="155" y="475" fill="#334155" font-family="Arial, sans-serif" font-size="22">1. GitHub issue is created automatically</text>
  <text x="155" y="512" fill="#334155" font-family="Arial, sans-serif" font-size="22">2. Admins review and respond</text>
  <text x="155" y="549" fill="#334155" font-family="Arial, sans-serif" font-size="22">3. Requesters can track updates later</text>
  <rect x="630" y="360" width="570" height="58" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="660" y="397" fill="#64748B" font-family="Arial, sans-serif" font-size="24">Your name</text>
  <rect x="630" y="438" width="570" height="58" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="660" y="475" fill="#64748B" font-family="Arial, sans-serif" font-size="24">Email for updates</text>
  <rect x="630" y="516" width="570" height="58" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="660" y="553" fill="#64748B" font-family="Arial, sans-serif" font-size="24">Feature title</text>
  <rect x="630" y="594" width="570" height="95" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="660" y="634" fill="#64748B" font-family="Arial, sans-serif" font-size="24">What problem should this solve?</text>
  <rect x="960" y="710" width="240" height="56" rx="28" fill="#0F172A"/>
  <text x="1008" y="746" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="700">Submit feature request</text>
</svg>
