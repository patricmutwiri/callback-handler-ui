# Callback Handler UI
# Production Nginx load balancer for multiple Next.js application nodes.
#
# Assumptions:
# - TLS terminates at Nginx.
# - Three Next.js app instances are running on separate hosts or containers.
# - The app itself serves both UI pages and API routes.
# - Session state is cookie-based, so sticky sessions are not required.
# - Replace the server_name, certificate paths, upstream addresses, and log paths
#   to match your environment.

user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 25m;

    resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
    resolver_timeout 5s;

    log_format callback_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id",'
            '"host":"$host",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/callback-handler-ui.access.log callback_json;
    error_log  /var/log/nginx/callback-handler-ui.error.log warn;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    limit_req_zone $binary_remote_addr zone=callback_general:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=callback_conn:10m;

    upstream callback_handler_ui_upstream {
        least_conn;
        keepalive 64;

        server 10.0.1.11:3000 max_fails=3 fail_timeout=30s;
        server 10.0.1.12:3000 max_fails=3 fail_timeout=30s;
        server 10.0.1.13:3000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name callback-handler-ui.vercel.app callback-handler.example.com;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name callback-handler-ui.vercel.app callback-handler.example.com;

        ssl_certificate     /etc/letsencrypt/live/callback-handler.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/callback-handler.example.com/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        limit_conn callback_conn 50;
        limit_req zone=callback_general burst=60 nodelay;

        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 15s;
        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location /_next/static/ {
            proxy_pass http://callback_handler_ui_upstream;
            proxy_cache_bypass $http_upgrade;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|ico|webp|avif|woff|woff2|ttf)$ {
            proxy_pass http://callback_handler_ui_upstream;
            proxy_cache_bypass $http_upgrade;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        location / {
            proxy_pass http://callback_handler_ui_upstream;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
    }
}
